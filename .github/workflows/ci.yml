# GitHub Actions CI/CD Pipeline for JAWS
# This file defines automated tests that run whenever code is pushed to the repository
# GitHub Actions is a CI/CD (Continuous Integration/Continuous Deployment) service
# that automatically runs tasks like tests, builds, and deployments
#
# Test Strategy:
# - On push: Run fast unit tests and JS lint only (no database required)
# - On pull request: Run unit, integration tests, and JS lint
# - On deployment (deploy.yml): Run API tests and Playwright E2E tests as a pre-deployment gate

name: CI Pipeline

# Define when this workflow should run
on:
  # Run on every push to any branch
  push:
    branches: ['**']

  # Run on every pull request targeting main
  pull_request:
    branches: [main]

  # Allow manually triggering this workflow from the Actions tab
  workflow_dispatch:

# Define the jobs to run
# By separating build and tests, we can:
# 1. Run unit tests and JS lint immediately after dependencies are installed (no database needed)
# 2. Run integration tests and static analysis after dependencies are ready
# 3. Maximize parallelism to reduce overall pipeline time
jobs:
  # ============================================================================
  # Job 1: Build Dependencies
  # This job installs PHP dependencies only
  # Fast and lightweight - just downloads packages
  # Runs on both push and pull requests (required for all tests)
  # ============================================================================
  build:
    name: Build Dependencies

    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup PHP environment
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, sqlite3, curl, mbstring, openssl
          coverage: none

      # Step 3: Validate composer.json
      - name: Validate Composer files
        run: composer validate --strict

      # Step 4: Cache Composer dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Step 5: Install dependencies
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Step 6: Upload vendor folder only
      # Unit tests only need dependencies, not the database
      - name: Upload vendor folder
        uses: actions/upload-artifact@v4
        with:
          name: vendor-artifacts
          path: vendor/
          retention-days: 1

  # ============================================================================
  # Job 2: Unit Tests
  # This job runs tests that check individual pieces of code in isolation
  # Unit tests don't need a database, so they can start immediately after build
  # This is now one of the FASTEST jobs in the pipeline
  # Runs on both push and pull requests for fast feedback
  # ============================================================================
  unit-tests:
    name: Run Unit Tests

    runs-on: ubuntu-latest

    # Only needs build job - can run in parallel with database setup
    needs: build

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, sqlite3, curl, mbstring, openssl
          coverage: none

      # Step 3: Download vendor folder only (no database needed)
      - name: Download vendor artifacts
        uses: actions/download-artifact@v4
        with:
          name: vendor-artifacts
          path: vendor

      # Step 4: Run unit tests
      # These run immediately - no waiting for database!
      - name: Run unit tests
        run: php vendor/bin/phpunit --testsuite=Unit

  # ============================================================================
  # Job 3: Lint JavaScript
  # Runs ESLint on the frontend JS files in public/app/js/
  # Independent of PHP build — no needs dependency, runs in parallel
  # Runs on both push and pull requests for fast feedback
  # ============================================================================
  lint-js:
    name: Lint JavaScript

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ============================================================================
  # Job 4: Static Analysis (PHPStan)
  # Runs on both push and pull requests for fast feedback
  # ============================================================================
  static-analysis:
    name: Static Analysis

    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, sqlite3, curl, mbstring, openssl
          coverage: none

      - name: Download vendor artifacts
        uses: actions/download-artifact@v4
        with:
          name: vendor-artifacts
          path: vendor

      - name: Run PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

  # ============================================================================
  # Job 5: Lint PHP (PHPCS)
  # Enforces PSR-12 coding style on src/
  # Runs on both push and pull requests for fast feedback
  # ============================================================================
  lint-php:
    name: Lint PHP (PHPCS)

    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: cs2pr
          extensions: pdo, pdo_sqlite, sqlite3, curl, mbstring, openssl
          coverage: none

      - name: Download vendor artifacts
        uses: actions/download-artifact@v4
        with:
          name: vendor-artifacts
          path: vendor

      - name: Run PHPCS
        run: php vendor/bin/phpcs --report=checkstyle | cs2pr

  # ============================================================================
  # Job 6: Integration Tests
  # This job runs tests that check how different parts work together
  # Integration tests use in-memory SQLite - no external database setup needed
  # Only runs on pull requests
  # ============================================================================
  integration-tests:
    name: Run Integration Tests

    runs-on: ubuntu-latest

    # Only needs build to complete first (integration tests use in-memory SQLite)
    needs: build

    # Only run on pull requests
    if: github.event_name == 'pull_request'

    steps:
      # Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, sqlite3, curl, mbstring, openssl
          coverage: none

      # Download vendor folder
      - name: Download vendor artifacts
        uses: actions/download-artifact@v4
        with:
          name: vendor-artifacts
          path: vendor

      # Run integration tests (excludes API tests via phpunit.xml)
      - name: Run integration tests
        run: php vendor/bin/phpunit --testsuite=Integration

  # ============================================================================
  # Job 7: Deploy to AWS Lightsail
  # ============================================================================
#   See deploy.yml for deployment steps - this is just the CI pipeline for testing.
#   API tests and Playwright E2E tests run in deploy.yml as a pre-deployment gate.
